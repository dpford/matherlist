const WEEKS = [
  "May 31 – June 3", "June 3 – 6", "June 7 – 13", "June 14 – 20",
  "June 21 – 27", "June 28 – July 4", "July 5 – 11", "July 12 – 18",
  "July 19 – 25", "July 26 – Aug 1", "Aug 2 – 8", "Aug 9 – 15"
];

function calculatePositions(wlNum) {
  const entry = DATA[wlNum];
  if (!entry) return null;

  const results = [];
  for (const [weekIdx, cabinStr] of Object.entries(entry)) {
    const wi = parseInt(weekIdx);
    const cabins = cabinStr.split(",");
    const uniqueCabins = [...new Set(cabins)];
    const cabinResults = [];

    for (const size of uniqueCabins) {
      let ahead = 0;
      let totalForSize = 0;
      for (let n = 1; n <= 1069; n++) {
        if (!DATA[n] || !DATA[n][wi]) continue;
        const theirCabins = DATA[n][wi].split(",");
        if (theirCabins.includes(size)) {
          totalForSize++;
          if (n < wlNum) ahead++;
        }
      }
      cabinResults.push({ size, position: ahead + 1, total: totalForSize });
    }
    results.push({ weekIdx: wi, weekName: WEEKS[wi], cabins: cabinStr, cabinResults });
  }
  return results;
}

function render(wlNum) {
  const el = document.getElementById("results");
  const err = document.getElementById("error");
  err.style.display = "none";
  el.innerHTML = "";

  if (!Number.isInteger(wlNum) || wlNum < 1 || wlNum > 1069) {
    err.textContent = "Please enter a number between 1 and 1069.";
    err.style.display = "block";
    return;
  }
  if (!DATA[wlNum]) {
    err.textContent = `Waitlist #${wlNum} was not found in the data.`;
    err.style.display = "block";
    return;
  }

  const results = calculatePositions(wlNum);
  const weekCount = results.length;

  let html = `<div class="summary">Waitlist <strong>#${wlNum}</strong> — signed up for <strong>${weekCount} week${weekCount !== 1 ? "s" : ""}</strong></div>`;

  for (const r of results) {
    html += `<div class="week-card"><h3>${r.weekName}</h3>`;
    html += `<div style="font-size:.85rem;color:#6b7280;margin-bottom:.5rem">Requested: ${r.cabins}</div>`;
    for (const c of r.cabinResults) {
      const pct = c.position / c.total;
      const cls = pct <= 0.25 ? "pos-green" : pct <= 0.5 ? "pos-yellow" : "pos-red";
      html += `<div class="cabin-row">
        <span class="cabin-label">${c.size}</span>
        <div class="cabin-pos">
          <span class="pos-badge ${cls}">#${c.position}</span>
          <span class="cabin-context">of ${c.total} families</span>
        </div>
      </div>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

document.getElementById("lookupBtn").addEventListener("click", () => {
  render(parseInt(document.getElementById("wlInput").value));
});
document.getElementById("wlInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") render(parseInt(document.getElementById("wlInput").value));
});
